<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Handleliste</title>
</head>

<body>

    <!--
Lag en array med varer
eks: melk, brød, ost, egg
Oppgaven skal inneholde loops gjennom arrayen, en li for hver vare , if og else til å markere en bestemt vare. 
Listen skal vises på siden. 

Ekstra: 
- legg til en knapp som legger til en ny vare i arrayen og oppdaterer visningen

Jeg trenger: 
- En id
- Variabler
- funksjon med loops, array samt if og else 
- hent elementer med getElementById 
- visListe(), fremfor updateView 
-->

    <h2>Handleliste</h2>
    <!--Her vises listen-->

    <!--input hvor brukeren legger varen til i listen-->
    <input id="nyVare">
    <!--knapp som legger varen til i listen-->
    <button onclick="leggTilVare()">Legg til vare</button>

    <!--Her vises listen-->
    <ul id="liste"></ul>


    <script>
        //array med varer
        let varer = ["melk", "brød", "ost", "egg"];
        //variabel som lagrer hvilken vare som er valgt 
        let valgteVarer = [];


        //kjører funksjonen første gang siden åpnes 
        visListe();

        function visListe() {
            //variabel som skal samle html-koden
            let html = "";

            //loop som går gjennom alle varer i arrayen 
            for (let i = 0; i < varer.length; i++) {

                if (valgteVarer.includes(varer[i])) {

                    html += /*HTML*/ `<li onclick="velgVare('${varer[i]}')" style="color:red;">${varer[i]}</li>`;

                } else {
                    html += /*HTML*/ `<li onclick="velgVare('${varer[i]}')">${varer[i]}</li>`;

                }
            }
            //setter HTML-koden inn i <ul>-element 
            document.getElementById("liste").innerHTML = html;
        }

        //tar inn en vare og sjekker om den er i valgt vare-lista 
        //hvis den er det skal den fjernes, hvis ikke skal den legges til 
        function velgVare(vare) {

            console.log(vare);
            console.log(valgteVarer);

            if (valgteVarer.includes(vare)) {

                valgteVarer.splice(valgteVarer.indexOf(vare), 1);

            } else {
                valgteVarer.push(vare);
            }

            visListe();

        }


        function leggTilVare() {
            //henter verdien fra input-feltet
            let ny = document.getElementById("nyVare").value;

            //legger varen inn i arrayen 
            varer.push(ny);

            //oppdaterer listen 
            visListe();

            document.getElementById("nyVare").value = "";
        }


    </script>

</body>

</html>
